<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="RoamingEye — open global satellite imaging">
  <defs>
    <radialGradient id="space" cx="38%" cy="40%" r="90%">
      <stop offset="0%" stop-color="#0b1222"/>
      <stop offset="100%" stop-color="#05070d"/>
    </radialGradient>
    <radialGradient id="globe" cx="38%" cy="34%" r="75%">
      <stop offset="0%" stop-color="#1f6b3a"/>
      <stop offset="45%" stop-color="#14502c"/>
      <stop offset="78%" stop-color="#0d2c34"/>
      <stop offset="100%" stop-color="#081a20"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="72%" stop-color="#4ea1ff" stop-opacity="0"/>
      <stop offset="92%" stop-color="#4ea1ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4ea1ff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="sphere"><circle cx="250" cy="180" r="132"/></clipPath>
  </defs>

  <rect width="1280" height="360" fill="url(#space)"/>

  <!-- stars -->
  <g fill="#ffffff">
    <circle cx="540" cy="60" r="1.4" opacity=".7"/>
    <circle cx="980" cy="90" r="1.1" opacity=".6"/>
    <circle cx="1140" cy="200" r="1.5" opacity=".8"/>
    <circle cx="620" cy="300" r="1.1" opacity=".5"/>
    <circle cx="860" cy="250" r="1.3" opacity=".7"/>
    <circle cx="1080" cy="300" r="1" opacity=".5"/>
    <circle cx="470" cy="150" r="1" opacity=".5"/>
    <circle cx="1210" cy="120" r="1.2" opacity=".6"/>
  </g>

  <!-- atmosphere halo -->
  <circle cx="250" cy="180" r="170" fill="url(#atmo)"/>

  <!-- globe -->
  <circle cx="250" cy="180" r="132" fill="url(#globe)"/>
  <g clip-path="url(#sphere)" stroke="#9fd4ff" stroke-opacity="0.28" fill="none" stroke-width="1">
    <!-- meridians -->
    <ellipse cx="250" cy="180" rx="44" ry="132"/>
    <ellipse cx="250" cy="180" rx="92" ry="132"/>
    <line x1="250" y1="48" x2="250" y2="312"/>
    <!-- parallels -->
    <line x1="118" y1="180" x2="382" y2="180" stroke-opacity="0.4"/>
    <path d="M126 132 Q250 150 374 132"/>
    <path d="M126 228 Q250 210 374 228"/>
  </g>
  <circle cx="250" cy="180" r="132" fill="none" stroke="#4ea1ff" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- wordmark -->
  <g font-family="Segoe UI, system-ui, -apple-system, sans-serif">
    <text x="470" y="158" font-size="74" font-weight="700" fill="#e8eef7">Roaming<tspan fill="#4ea1ff">Eye</tspan></text>
    <text x="474" y="210" font-size="27" fill="#aab6c8">Open, global satellite imaging — free, for every scientist on Earth.</text>
    <text x="474" y="252" font-size="18" fill="#7f8da0">Scrub decades of NASA imagery · search any place · study a region at 30&#8201;m · 100% open data</text>
    <g transform="translate(474,278)" font-size="15" fill="#8b97ab">
      <rect x="0" y="0" width="118" height="26" rx="13" fill="#11203a" stroke="#23406e"/>
      <text x="59" y="17" text-anchor="middle" fill="#9fd4ff">NASA GIBS</text>
      <rect x="130" y="0" width="120" height="26" rx="13" fill="#11203a" stroke="#23406e"/>
      <text x="190" y="17" text-anchor="middle" fill="#9fd4ff">Three.js</text>
      <rect x="262" y="0" width="96" height="26" rx="13" fill="#11203a" stroke="#23406e"/>
      <text x="310" y="17" text-anchor="middle" fill="#9fd4ff">MIT</text>
    </g>
  </g>
</svg>

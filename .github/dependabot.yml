version: 2
updates:
  # Keep npm dependencies current and patched.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk dev-tooling bumps into one PR to cut review noise.
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch

  # Keep GitHub Actions current. Because we pin actions to commit SHAs,
  # Dependabot updates the SHA and the trailing `# vX.Y.Z` version comment.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

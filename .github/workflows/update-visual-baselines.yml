name: Update visual baselines

# Regenerates the visual-regression baselines in the environment they are
# defined for (Linux CI) and publishes them as an artifact. Flow: run this
# on your branch from the Actions tab, download the artifact, commit its
# contents to e2e/__screenshots__/ — see CONTRIBUTING.md.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    name: Regenerate baselines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - run: npx playwright test --config playwright.visual.config.ts --update-snapshots
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: visual-baselines
          path: e2e/__screenshots__/
          retention-days: 7

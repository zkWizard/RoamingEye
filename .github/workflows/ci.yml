name: CI

# Runs on every PR and on pushes to main. PRs from forks run with a read-only
# token and NO repository secrets by design — every job below is secret-free,
# so a malicious fork PR cannot exfiltrate anything. Never switch this to
# `pull_request_target` to "fix" missing secrets; that runs untrusted fork code
# with write access. See CONTRIBUTING.md.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Least privilege: jobs get only read access to repo contents unless a specific
# job overrides it.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  e2e:
    name: E2E smoke (WebGL)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  visual:
    name: Visual regression (advisory)
    runs-on: ubuntu-latest
    # Advisory by design (the roadmap's own wording): a visual diff posts
    # its report artifact but never blocks a merge. Screenshot gates earn
    # trust before they gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - run: npx playwright test --config playwright.visual.config.ts
      - name: Upload diff report
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: visual-regression-report
          path: test-results/
          retention-days: 14

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Fails only on high/critical advisories to avoid blocking PRs on noise.
      - run: npm audit --audit-level=high

  supply-chain:
    name: Supply-chain gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      # Every lockfile entry must resolve to registry.npmjs.org over HTTPS
      # with an integrity hash — a poisoned lockfile edit (mirror host,
      # http:// downgrade) fails here, because humans don't read 10k-line
      # lockfile diffs. Tool versions pinned for determinism.
      - name: Lockfile host/protocol/integrity lint
        run: npx --yes lockfile-lint@4.14.1 --path package-lock.json --allowed-hosts npm --validate-https --validate-integrity
      - run: npm ci
      # "100% open" is enforced, not asserted. Shipped code (production
      # tree) is held to strictly MIT-compatible permissive licenses; the
      # dev tree additionally admits weak-copyleft tooling (MPL-2.0 — e.g.
      # axe-core) and open data/doc licenses, none of which we distribute.
      - name: License allowlist (shipped code)
        run: npx --yes license-checker-rseidelsohn@4.4.2 --production --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;Unlicense"
      - name: License allowlist (full dev tree)
        run: npx --yes license-checker-rseidelsohn@4.4.2 --onlyAllow "MIT;ISC;BSD-2-Clause;BSD-3-Clause;Apache-2.0;0BSD;CC0-1.0;CC-BY-4.0;Unlicense;BlueOak-1.0.0;MPL-2.0;Python-2.0"

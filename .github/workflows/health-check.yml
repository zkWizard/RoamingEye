name: Health check

# Daily pulse on the things a commit can't break: the deployed site (GitHub
# Pages) and the upstream open-data services the app depends on (NASA GIBS,
# OSM Nominatim, USGS). Any of them can degrade without a change landing in
# this repo — this workflow notices before a disappointed user does.
#
# Reporting is two-strike: a single failing run just fails (upstream blips
# are normal); two consecutive failures open — or update, never duplicate —
# one issue labeled `health`, which auto-closes on the next green run.
on:
  schedule:
    - cron: "17 5 * * *" # daily, 05:17 UTC
  workflow_dispatch:
    inputs:
      site_url:
        description: "Override the live-site URL (for testing the failure path)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  probe:
    name: Probe site & upstream data
    runs-on: ubuntu-latest
    outputs:
      failures: ${{ steps.checks.outputs.failures }}
    steps:
      - name: Run checks
        id: checks
        run: |
          set -u
          SITE="${{ inputs.site_url != '' && inputs.site_url || 'https://zkwizard.github.io/RoamingEye/' }}"
          FAILURES=""

          note() { FAILURES="${FAILURES}${1}\n"; echo "::warning::$1"; }

          # 1. Live site: reachable, and the page references its bundle entry.
          body=$(curl -sS --max-time 30 --retry 1 "$SITE" || true)
          if [ -z "$body" ]; then
            note "Live site: no response from $SITE"
          elif ! echo "$body" | grep -q '<script[^>]*src='; then
            note "Live site: page loads but references no bundle script"
          fi

          # 2. NASA GIBS WMS: a tiny GetMap for a fixed known-good month must
          #    come back as an image (XML-with-200 is a ServiceException = down).
          gibs_ct=$(curl -sS --max-time 30 --retry 1 -o /dev/null -w '%{content_type}' \
            "https://gibs.earthdata.nasa.gov/wms/epsg4326/best/wms.cgi?SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0&LAYERS=MODIS_Terra_L3_NDVI_Monthly&CRS=EPSG:4326&BBOX=-10,-10,10,10&WIDTH=64&HEIGHT=64&FORMAT=image/jpeg&TIME=2026-01-01" || true)
          case "$gibs_ct" in
            image/*) : ;;
            *) note "GIBS WMS: expected image/*, got '${gibs_ct:-no response}'" ;;
          esac

          # 3. Nominatim: one policy-compliant request (identifying UA, single
          #    query) must return JSON.
          nom_ct=$(curl -sS --max-time 30 --retry 1 -o /dev/null -w '%{content_type}' \
            -H "User-Agent: RoamingEye-health-check/1.0 (+https://github.com/zkWizard/RoamingEye)" \
            "https://nominatim.openstreetmap.org/search?q=Reykjavik&format=jsonv2&limit=1" || true)
          case "$nom_ct" in
            *json*) : ;;
            *) note "Nominatim: expected JSON, got '${nom_ct:-no response}'" ;;
          esac

          # 4. USGS seismicity feed.
          usgs_ct=$(curl -sS --max-time 30 --retry 1 -o /dev/null -w '%{content_type}' \
            "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/4.5_week.geojson" || true)
          case "$usgs_ct" in
            *json*) : ;;
            *) note "USGS feed: expected JSON, got '${usgs_ct:-no response}'" ;;
          esac

          {
            echo "failures<<EOF"
            printf '%b' "$FAILURES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          if [ -n "$FAILURES" ]; then exit 1; fi

  report:
    name: File / resolve the health issue
    needs: probe
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TITLE: "Health check failing"
      # Via env, never inline ${{ }} in run: — shell-injection hygiene.
      FAILURES: ${{ needs.probe.outputs.failures }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - name: Report two-strike failures, close on recovery
        run: |
          set -u
          open_issue=$(gh issue list --label health --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty')

          if [ "${{ needs.probe.result }}" = "success" ]; then
            if [ -n "$open_issue" ]; then
              gh issue close "$open_issue" --comment "Health check is green again ([run]($RUN_URL))."
            fi
            exit 0
          fi

          # First strike: only report if the previous completed run also failed.
          prev=$(gh run list --workflow health-check.yml --limit 2 \
            --json databaseId,conclusion \
            --jq "[.[] | select(.databaseId != ${{ github.run_id }})][0].conclusion // empty")
          if [ "$prev" != "failure" ]; then
            echo "First failure — waiting for a second strike before filing."
            exit 0
          fi

          body="The scheduled health check has failed twice in a row.

          Failing checks:
          \`\`\`
          ${FAILURES}
          \`\`\`
          Latest run: $RUN_URL"

          if [ -n "$open_issue" ]; then
            gh issue comment "$open_issue" --body "$body"
          else
            gh issue create --title "$TITLE" --label health --label robustness --body "$body"
          fi

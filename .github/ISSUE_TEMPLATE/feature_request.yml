name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the motivation. What can't you do today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
  - type: markdown
    attributes:
      value: |
        > For **substantial or architectural** changes (a new subsystem, coordinate-system
        > or data-pipeline changes, etc.), please use the **Design proposal** template
        > instead so we can agree the approach before implementation.

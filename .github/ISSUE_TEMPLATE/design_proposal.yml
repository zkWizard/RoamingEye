name: Design proposal
description: Propose a substantial or architectural change (our lightweight RFC)
title: "[Proposal]: "
labels: ["proposal", "needs-discussion"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for substantial changes — new subsystems, coordinate-system or
        data-pipeline changes, or anything broad or hard to reverse. The goal is
        to agree on the design **before** significant implementation work. See
        [GOVERNANCE.md](../../GOVERNANCE.md#proposals-for-substantial-changes).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One paragraph explaining the change.
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve? Why now? Who benefits?
    validations:
      required: true
  - type: textarea
    id: design
    attributes:
      label: Proposed design
      description: The technical approach in enough detail to evaluate it.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches and why you didn't choose them.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact & risks
      description: Performance, data sources/licensing, breaking changes, areas touched.
    validations:
      required: true

name: Bug report
description: Something isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce it?
      placeholder: |
        1. Go to '...'
        2. Drag the globe '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Desktop
        - Mobile
        - Tablet
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: "e.g. Chrome 126 on Windows 11, Safari on iOS 18"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Paste any errors from the browser dev-tools console (if any).
      render: shell
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag in any screenshots or recordings that help.
